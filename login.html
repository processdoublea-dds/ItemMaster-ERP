<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DA-ERP | Login</title>
    <meta name="description" content="Login to Item Code Generator with HRMS credentials">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-bg">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo & Title -->
            <div class="login-header">
                <div class="login-logo">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M8 21H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M12 17V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M7 8H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M7 11H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1>🔐 DA-ERP Item Master</h1>
                <p class="login-subtitle">ระบบจัดการข้อมูลสินค้า · Double A</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="form-field">
                    <label for="username">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Username
                    </label>
                    <input type="text" id="username" name="username" placeholder="HRMS Username" required autofocus>
                </div>

                <div class="form-field">
                    <label for="password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="HRMS Password" required>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" id="eyeIcon">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="loginError" class="login-error hidden">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span id="loginErrorText"></span>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-text">เข้าสู่ระบบ</span>
                    <div class="btn-spinner hidden" id="loginSpinner">
                        <div class="spinner"></div>
                    </div>
                </button>
            </form>

            <div class="login-footer">
                <p>ใช้ Username และ Password เดียวกับระบบ HRMS</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-md5@0.8.3/src/md5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        // If already logged in, redirect
        if (isLoggedIn()) {
            window.location.href = 'index.html';
        }

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const loginErrorText = document.getElementById('loginErrorText');
        const btnLogin = document.getElementById('btnLogin');
        const loginSpinner = document.getElementById('loginSpinner');
        const btnText = btnLogin.querySelector('.btn-text');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        });

        // Login form submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) return;

            // Show loading
            btnText.textContent = 'กำลังเข้าสู่ระบบ...';
            loginSpinner.classList.remove('hidden');
            btnLogin.disabled = true;
            loginError.classList.add('hidden');

            try {
                const user = await performLogin(username, password);
                
                // Success animation
                btnText.textContent = '✅ สำเร็จ!';
                loginSpinner.classList.add('hidden');
                
                // Redirect to homepage/dashboard
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);

            } catch (err) {
                // Show error
                loginErrorText.textContent = err.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
                loginError.classList.remove('hidden');
                btnText.textContent = 'เข้าสู่ระบบ';
                loginSpinner.classList.add('hidden');
                btnLogin.disabled = false;
            }
        });
    </script>
</body>
</html>
